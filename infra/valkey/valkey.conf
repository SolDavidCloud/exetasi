################################################################################
# Exetasi Valkey configuration (rate-limit backend).
#
# Security posture:
#   - Auth REQUIRED (requirepass is passed on the command line from
#     docker-compose env, not checked into VCS).
#   - No persistence — rate-limit counters are ephemeral, and disabling
#     RDB/AOF both removes a disk-IO attack surface and prevents counter
#     snapshots from leaking via backups.
#   - Dangerous administrative commands are renamed to empty strings so an
#     attacker with a valid app-tier credential still cannot reconfigure
#     the server, dump data, or wipe state.
#   - Hard memory cap with an LRU eviction policy so a runaway attacker
#     cannot exhaust host RAM.
#   - TLS stanza is present but commented — uncomment once you mount
#     certificates into /certs. We recommend running TLS-only
#     (port 0 + tls-port 6379) in production.
################################################################################

# The container publishes 6379 on 127.0.0.1 via docker-compose port mapping.
# Inside the container network we bind to all interfaces so the backend
# service on the same compose network can reach it.
bind 0.0.0.0
protected-mode yes
port 6379

# Connection hygiene.
tcp-keepalive 60
tcp-backlog 128
timeout 0

# ---- Persistence --------------------------------------------------------------
# Rate-limit state is ephemeral by design. We explicitly disable both
# snapshotting and AOF so nothing hits disk.
save ""
appendonly no
stop-writes-on-bgsave-error yes

# ---- Memory -------------------------------------------------------------------
# Cap memory and evict the least-recently-used keys when full. Keeps one
# chatty attacker from taking down the whole rate-limiter.
maxmemory 128mb
maxmemory-policy allkeys-lru

# Disallow replication / cluster modes — this deployment is a single node.
# Leave replica-* at defaults (we never configure replicaof).

# ---- Command hardening --------------------------------------------------------
# Rename admin + destructive commands to empty strings so that even with a
# valid credential an attacker cannot reconfigure the instance or wipe
# counters. slowapi/limits does NOT need any of these to function.
rename-command CONFIG ""
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
rename-command SHUTDOWN ""
rename-command SAVE ""
rename-command BGSAVE ""
rename-command BGREWRITEAOF ""
rename-command REPLICAOF ""
rename-command SLAVEOF ""
rename-command MODULE ""
rename-command SCRIPT ""
rename-command KEYS ""
rename-command MIGRATE ""

# Slowlog is fine; keep a small buffer for incident review.
slowlog-log-slower-than 10000
slowlog-max-len 128

# Never notify keyspace events (the default) — no subscribers.
notify-keyspace-events ""

# ---- TLS (opt-in) -------------------------------------------------------------
# Uncomment and mount /certs with your certificates. Recommended for any
# deployment where the backend and Valkey don't share a private link.
#
# port 0
# tls-port 6379
# tls-cert-file /certs/valkey.crt
# tls-key-file  /certs/valkey.key
# tls-ca-cert-file /certs/ca.crt
# tls-auth-clients yes
# tls-protocols "TLSv1.3 TLSv1.2"
# tls-ciphers "ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305"
# tls-prefer-server-ciphers yes

# ---- ACL-ready ---------------------------------------------------------------
# With Valkey 8 you can layer a proper ACL on top of requirepass. Example
# you can drop in once you're ready (mount as /etc/valkey/users.acl and
# uncomment `aclfile` below):
#
#   user default off
#   user exetasi_rl on >${VALKEY_APP_PASSWORD} ~exetasi:rl:* +@read +@write +@connection +eval +evalsha -@dangerous
#
# aclfile /etc/valkey/users.acl
